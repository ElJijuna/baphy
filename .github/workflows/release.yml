name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release @baphy/${{ matrix.package }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        package: [npm, dora, docker, gh]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Required so @semantic-release/git can push back to the repo
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm --workspace @baphy/${{ matrix.package }} run build

      # Each package has an isolated semantic-release config. Only commits with
      # the matching package scope can trigger and populate that package release.
      - name: Release @baphy/${{ matrix.package }}
        working-directory: packages/${{ matrix.package }}
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
